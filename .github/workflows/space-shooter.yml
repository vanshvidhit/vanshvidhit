name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'  # Runs automatically every day at midnight
  workflow_dispatch:  # Allows manual button trigger

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Space Shooter Game
        uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'

      - name: Commit and Push Game GIF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add game.gif
          git commit -m "Generated animated profile space shooter grid" || exit 0
          git push
