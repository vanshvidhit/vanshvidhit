name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'  # Runs automatically every day at midnight UTC
  workflow_dispatch:  # Allows you to trigger it manually anytime

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Crucial for tracking change history

      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'

      - name: Commit and Push Game GIF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add game.gif
          git commit -m "Update Space Shooter Profile Game" || exit 0
          git push
