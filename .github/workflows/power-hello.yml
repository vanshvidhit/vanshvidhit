name: Generate power-hello SVG

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install power-hello
        run: pip3 install git+https://github.com/yoshi389111/power-hello.git

      - name: Generate SVG
        run: |
          mkdir -p assets
          power-hello -c '#c9d1d9' -b transparent -s '#00f2fe' -o assets/power-hello.svg \
            "Open VexaRent" "Deploy MERN stack" "Systems online"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/power-hello.svg
          git diff --staged --quiet || git commit -m "chore: update power-hello animation"
          git push
